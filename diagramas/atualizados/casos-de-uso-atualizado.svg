<g><ellipse cx="740" cy="150" rx="140" ry="50" class="use"/><text x="673" y="157" class="ut">Realizar login</text><ellipse cx="740" cy="260" rx="140" ry="50" class="use"/><text x="665" y="267" class="ut">Visualizar painel</text><ellipse cx="740" cy="370" rx="140" ry="50" class="use"/><text x="655" y="377" class="ut">Gerenciar veículos</text><ellipse cx="740" cy="480" rx="140" ry="50" class="use"/><text x="647" y="487" class="ut">Cadastrar condutores</text><ellipse cx="1190" cy="150" rx="140" ry="50" class="use"/><text x="1112" y="157" class="ut">Registrar entrada</text><ellipse cx="1190" cy="260" rx="140" ry="50" class="use"/><text x="1120" y="267" class="ut">Registrar saída</text><ellipse cx="1190" cy="370" rx="140" ry="50" class="use"/><text x="1117" y="377" class="ut">Cadastrar vagas</text><ellipse cx="1190" cy="480" rx="140" ry="50" class="use"/><text x="1075" y="487" class="ut">Consultar movimentações</text><ellipse cx="1190" cy="590" rx="140" ry="50" class="use"/><text x="1125" y="597" class="ut">Enviar contato</text></g><text x="60" y="840" class="ut">O gerenciamento de veículos inclui cadastrar, listar, visualizar, editar e excluir. A consulta permite filtros por placa, responsável, período e tipo.</text></svg>
