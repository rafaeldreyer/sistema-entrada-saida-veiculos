<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
<defs><style>.title{font:700 34px Arial;fill:#173a5b}.head{font:700 22px Arial;fill:#fff}.field{font:18px Arial;fill:#202c36}.key{font:700 17px Arial;fill:#237a57}.box{fill:#fff;stroke:#24557f;stroke-width:3}.bar{fill:#24557f}.rel{stroke:#607487;stroke-width:3;fill:none}.label{font:16px Arial;fill:#415466}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#607487"/></marker></defs>
<rect width="1800" height="1100" fill="#f7f9fb"/><text x="60" y="58" class="title">Modelo relacional atualizado — Sistema de Entrada e Saída de Veículos</text>
<g transform="translate(60 110)"><rect class="box" width="380" height="310"/><rect class="bar" width="380" height="52"/><text class="head" x="20" y="35">USUARIOS</text><text class="key" x="20" y="85">PK id_usuario</text><text class="field" x="20" y="118">nome • nome_usuario (UK)</text><text class="field" x="20" y="151">email (UK) • senha_hash</text><text class="field" x="20" y="184">perfil • status</text><text class="field" x="20" y="217">created_at • updated_at</text></g>
<g transform="translate(60 520)"><rect class="box" width="380" height="360"/><rect class="bar" width="380" height="52"/><text class="head" x="20" y="35">CONDUTORES</text><text class="key" x="20" y="85">PK id_condutor</text><text class="field" x="20" y="118">nome • cpf (UK)</text><text class="field" x="20" y="151">telefone • email</text><text class="field" x="20" y="184">tipo_condutor • unidade_setor</text><text class="field" x="20" y="217">status</text><text class="field" x="20" y="250">created_at • updated_at</text></g>
<g transform="translate(710 105)"><rect class="box" width="380" height="345"/><rect class="bar" width="380" height="52"/><text class="head" x="20" y="35">VEICULOS</text><text class="key" x="20" y="85">PK id_veiculo</text><text class="field" x="20" y="118">FK id_condutor</text><text class="field" x="20" y="151">placa (UK) • marca • modelo</text><text class="field" x="20" y="184">cor • ano_modelo • tipo_veiculo</text><text class="field" x="20" y="217">observacao • status</text><text class="field" x="20" y="250">created_at • updated_at</text></g>
<g transform="translate(710 600)"><rect class="box" width="380" height="300"/><rect class="bar" width="380" height="52"/><text class="head" x="20" y="35">VAGAS</text><text class="key" x="20" y="85">PK id_vaga</text><text class="field" x="20" y="118">codigo (UK) • setor</text><text class="field" x="20" y="151">tipo_vaga • status</text><text class="field" x="20" y="184">observacao</text><text class="field" x="20" y="217">created_at • updated_at</text></g>
<g transform="translate(1320 160)"><rect class="box" width="420" height="505"/><rect class="bar" width="420" height="52"/><text class="head" x="20" y="35">MOVIMENTACOES</text><text class="key" x="20" y="85">PK id_movimentacao</text><text class="field" x="20" y="118">FK id_veiculo • id_condutor</text><text class="field" x="20" y="151">FK id_vaga</text><text class="field" x="20" y="184">FK id_usuario_entrada</text><text class="field" x="20" y="217">FK id_usuario_saida (opcional)</text><text class="field" x="20" y="250">data_hora_entrada</text><text class="field" x="20" y="283">data_hora_saida (opcional)</text><text class="field" x="20" y="316">motivo_visita • observacao</text><text class="field" x="20" y="349">status</text></g>
<g transform="translate(1320 775)"><rect class="box" width="420" height="260"/><rect class="bar" width="420" height="52"/><text class="head" x="20" y="35">CONTATOS</text><text class="key" x="20" y="85">PK id_contato</text><text class="field" x="20" y="118">nome • email • assunto</text><text class="field" x="20" y="151">mensagem • data_envio • status</text></g>
<path class="rel" marker-end="url(#arrow)" d="M440 690 C560 690 590 300 710 300"/><text class="label" x="505" y="490">1 possui N</text>
<path class="rel" marker-end="url(#arrow)" d="M1090 270 C1190 270 1210 300 1320 300"/><text class="label" x="1140" y="250">1 gera N</text>
<path class="rel" marker-end="url(#arrow)" d="M1090 740 C1190 740 1210 560 1320 560"/><text class="label" x="1150" y="690">1 recebe N</text>
<path class="rel" marker-end="url(#arrow)" d="M440 210 C800 20 1190 180 1320 220"/><text class="label" x="780" y="92">1 registra N entradas/saídas</text>
<path class="rel" marker-end="url(#arrow)" d="M440 760 C850 1040 1180 620 1320 610"/><text class="label" x="820" y="990">1 realiza N movimentações</text>
<text class="label" x="60" y="1045">Observação: CONTATOS é independente. Datas, placa e combinações de status possuem índices conforme o SQL.</text>
</svg>
